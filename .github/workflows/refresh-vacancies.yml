name: Refresh vacancies

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python scripts/job-search.py
      - run: |
          git config user.name "vacancy-bot"
          git config user.email "bot@example.com"
          git add docs/index.html
          git diff --cached --quiet || git commit -m "[auto] refresh vacancies"
          git push
