name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff mdformat markdown-link-check

      - name: Lint Python with ruff
        run: |
          ruff check .

      - name: Check Markdown formatting
        run: |
          mdformat --check docs career || true

      - name: Check Markdown links
        run: |
          npx -y markdown-link-check "docs/**/*.md" -q || true

      - name: Run smoke checks
        run: |
          python -V
          if ls *.py 1> /dev/null 2>&1; then for f in *.py; do python -m py_compile "$f" || exit 1; done; fi
