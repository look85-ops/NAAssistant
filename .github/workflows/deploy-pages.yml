name: Deploy Portfolio to GitHub Pages

on:
  push:
    branches: [ main, deploy/portfolio ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Prepare dist (portfolio + booster)
        run: |
          set -e
          mkdir -p dist
          cp -r portfolio dist/.
          if [ -d methodist-booster ]; then cp -r methodist-booster dist/methodist-booster; fi
          # Publish message-accidental at root for canonical URL
          cp portfolio/message-accidental_1.html dist/
          # Root index with redirect to portfolio
          cat > dist/index.html <<'EOF'
          <!doctype html>
          <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
          <title>Natalia L&D — Pages</title>
          <meta http-equiv="refresh" content="0; url=./portfolio/index2-light.html">
          <p>Если авто-переход не сработал: <a href="./portfolio/index2-light.html">портфолио</a> · <a href="./methodist-booster/">бустер методиста</a></p>
          EOF
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
