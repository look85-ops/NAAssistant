<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CUCPO Chat — Hugging Face Space</title>
  <style>
    html, body { height: 100%; margin: 0; background: #0b1020; color: #e8eefc; font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; }
    header { padding: 12px 16px; background: #0f1530; border-bottom: 1px solid #1e264d; display: flex; align-items: center; justify-content: space-between; }
    header .title { font-weight: 600; }
    header .link { color: #8fb3ff; text-decoration: none; }
    .wrap { height: calc(100% - 54px); }
    iframe { border: 0; width: 100%; height: 100%; }
    .fallback { padding: 24px; }
    .btn { display: inline-block; padding: 10px 14px; background: #2a3b8f; color: #fff; text-decoration: none; border-radius: 8px; }
  </style>
  <script>
    // If embedding is blocked, show fallback link
    function onFrameError() {
      var fb = document.getElementById('fb');
      fb.style.display = 'block';
    }
  </script>
  <!-- Optional meta for social previews -->
  <meta property="og:title" content="CUCPO Chat — Hugging Face Space" />
  <meta property="og:description" content="Чат-демо на базе DeepSeek-R1-Distill-Qwen-7B (4-bit) с LoRA." />
  <meta property="og:url" content="https://thrgbbnh-cu-cpo.hf.space" />
  <meta name="robots" content="noindex" />
  </head>
<body>
  <header>
    <div class="title">CUCPO Chat</div>
    <a class="link" href="https://huggingface.co/spaces/Thrgbbnh/CU_CPO" target="_blank" rel="noopener">Открыть на Hugging Face</a>
  </header>
  <div class="wrap">
    <iframe src="https://thrgbbnh-cu-cpo.hf.space" onerror="onFrameError()" allow="clipboard-write; clipboard-read; fullscreen"></iframe>
    <div id="fb" class="fallback" style="display:none">
      <p>Не удалось встроить приложение. Открой напрямую:</p>
      <p><a class="btn" href="https://thrgbbnh-cu-cpo.hf.space" target="_blank" rel="noopener">Перейти в CUCPO Chat</a></p>
    </div>
  </div>
</body>
</html>
