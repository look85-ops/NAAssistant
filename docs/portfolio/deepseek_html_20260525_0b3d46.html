<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Послание случайно | дофамин-автомат 🧃</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0a0f;
      --chat-bg: #1a1a2e;
      --text: #fff;
      --accent: #FF69B4;
      --accent2: #39FF14;
      --bubble-bot: #2a2a3e;
      --bubble-user: #3a1a4e;
      --font: 'Inter', sans-serif;
    }

    body {
      background: var(--bg);
      font-family: var(--font);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: var(--text);
      overflow-x: hidden;
      position: relative;
      transition: background 0.3s, color 0.3s;
    }

    /* Темы */
    body.theme-pink {
      --bg: #0a0a0f;
      --accent: #FF69B4;
      --accent2: #39FF14;
      --bubble-bot: #2a2a3e;
      --bubble-user: #3a1a4e;
    }

    body.theme-green {
      --bg: #050505;
      --accent: #39FF14;
      --accent2: #FF69B4;
      --bubble-bot: #1a2a1a;
      --bubble-user: #2a3a2a;
    }

    body.theme-vaporwave {
      --bg: #0d0221;
      --accent: #ff00ff;
      --accent2: #00ffff;
      --bubble-bot: #1a0a2e;
      --bubble-user: #2a1a4e;
      background: linear-gradient(45deg, #0d0221 0%, #1a0a2e 100%);
    }

    .bg-elements {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .container {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 450px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-height: 900px;
    }

    /* Переключатель тем */
    .theme-selector {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 100;
      display: flex;
      gap: 10px;
      background: rgba(0,0,0,0.5);
      padding: 5px;
      border-radius: 30px;
    }

    .theme-btn {
      width: 25px;
      height: 25px;
      border-radius: 50%;
      border: 2px solid #fff;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .theme-btn:hover { transform: scale(1.2); }
    .theme-pink-btn { background: #FF69B4; }
    .theme-green-btn { background: #39FF14; }
    .theme-vaporwave-btn { background: linear-gradient(135deg, #ff00ff, #00ffff); }

    /* Чат-интерфейс */
    .chat-header {
      text-align: center;
      padding: 10px 0;
      border-bottom: 1px solid var(--accent);
      margin-bottom: 10px;
    }

    .chat-header h1 {
      font-size: 1.8rem;
      font-weight: 900;
      color: var(--accent2);
      text-shadow: 2px 2px 0 var(--accent);
      letter-spacing: -0.02em;
    }

    .chat-header .status {
      font-size: 0.8rem;
      color: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent2);
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0% { opacity: 1; }
      50% { opacity: 0.3; }
      100% { opacity: 1; }
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 10px 0;
      display: flex;
      flex-direction: column;
      gap: 15px;
      scrollbar-width: thin;
    }

    .message-row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
    }

    .message-row.bot {
      justify-content: flex-start;
    }

    .message-row.user {
      justify-content: flex-end;
    }

    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--bubble-bot);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      flex-shrink: 0;
    }

    .bubble {
      max-width: 75%;
      padding: 12px 16px;
      border-radius: 18px;
      font-size: 1.1rem;
      line-height: 1.4;
      word-break: break-word;
      position: relative;
      animation: bubbleIn 0.3s ease-out;
    }

    .bot .bubble {
      background: var(--bubble-bot);
      border: 1px solid var(--accent);
      border-bottom-left-radius: 4px;
    }

    .user .bubble {
      background: var(--bubble-user);
      border: 1px solid var(--accent2);
      border-bottom-right-radius: 4px;
    }

    @keyframes bubbleIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Кнопка-рычаг внутри чата */
    .lever-area {
      text-align: center;
      margin: 20px 0;
    }

    .lever-handle {
      font-size: 3.5rem;
      cursor: pointer;
      display: inline-block;
      transition: transform 0.3s cubic-bezier(0.68, -0.55, 0.27, 1.55);
      user-select: none;
      filter: drop-shadow(0 0 15px var(--accent));
      animation: float 2s ease-in-out infinite;
    }

    .lever-handle:active {
      transform: translateY(15px) scale(0.85);
      animation: none;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-8px); }
    }

    /* Инпут для имени друга */
    .friend-input-area {
      display: flex;
      gap: 10px;
      padding: 10px;
      background: rgba(0,0,0,0.3);
      border-radius: 30px;
      margin: 10px 0;
      align-items: center;
    }

    .friend-input {
      flex: 1;
      background: transparent;
      border: none;
      color: white;
      font-size: 1rem;
      padding: 8px 12px;
      outline: none;
    }

    .friend-input::placeholder {
      color: #aaa;
    }

    .friend-btn {
      background: var(--accent);
      border: none;
      color: #000;
      font-weight: bold;
      padding: 8px 18px;
      border-radius: 30px;
      cursor: pointer;
      font-size: 0.9rem;
    }

    /* Реакции */
    .reactions {
      display: flex;
      gap: 12px;
      margin-top: 10px;
      flex-wrap: wrap;
    }

    .reaction-btn {
      background: rgba(255,255,255,0.1);
      border: none;
      color: white;
      font-size: 1.2rem;
      padding: 6px 12px;
      border-radius: 20px;
      cursor: pointer;
      transition: background 0.2s;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .reaction-btn.active {
      background: var(--accent);
      color: #000;
    }

    /* Меню шаринга */
    .share-panel {
      display: flex;
      gap: 10px;
      margin-top: 10px;
      flex-wrap: wrap;
    }

    .share-option {
      background: rgba(255,255,255,0.1);
      border: 1px solid var(--accent);
      color: white;
      padding: 8px 12px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 5px;
      transition: background 0.2s;
    }

    .share-option:hover {
      background: var(--accent);
      color: #000;
    }

    /* Скрытое canvas для генерации картинки */
    #imageCanvas {
      display: none;
    }

    /* Glitch overlay */
    .glitch-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(2px);
      z-index: 50;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.1s;
    }

    /* Неоновые линии на фоне */
    .neon-lines {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
      opacity: 0.2;
    }
  </style>
</head>
<body class="theme-pink">
  <div class="bg-elements" id="emojiRain"></div>
  <div class="glitch-overlay" id="glitchOverlay"></div>
  <canvas id="imageCanvas" width="1080" height="1920"></canvas>

  <div class="theme-selector">
    <div class="theme-btn theme-pink-btn" onclick="setTheme('pink')"></div>
    <div class="theme-btn theme-green-btn" onclick="setTheme('green')"></div>
    <div class="theme-btn theme-vaporwave-btn" onclick="setTheme('vaporwave')"></div>
  </div>

  <div class="container">
    <div class="chat-header">
      <h1>Послание случайно</h1>
      <div class="status">
        <span class="status-dot"></span> дофамин-автомат онлайн
      </div>
    </div>

    <div class="chat-messages" id="chatMessages">
      <!-- Сообщения будут добавляться динамически -->
    </div>

    <!-- Инпут для друга (скрыт по умолчанию) -->
    <div class="friend-input-area" id="friendInputArea" style="display:none;">
      <input type="text" class="friend-input" id="friendNameInput" placeholder="Имя друга...">
      <button class="friend-btn" id="friendSubmitBtn">Отправить</button>
    </div>

    <div class="lever-area">
      <div class="lever-handle" id="leverHandle">🕹️</div>
      <div style="color:var(--accent); font-size:0.8rem;">дёрни рычаг</div>
    </div>
  </div>

  <script>
    // ---------- DATA ----------
    const messages = [
      "✨ Сегодня ты справишься даже с распутыванием наушников с первого раза",
      "🎯 Ты мощнее, чем Wi-Fi сигнал у окна",
      "⚡ Твоя продуктивность сегодня на уровне батарейки Duracell — может, немного б/у, но всё ещё работает!",
      "🌌 Ты существуешь. И это уже невероятное достижение на фоне бесконечности космоса",
      "💫 Твоё существование статистически невероятно. А ты вот просто существуешь. Магия",
      "⭐ Ты — временная конфигурация атомов, которая умеет переживать и любить. Это круто",
      "💐 Ты пахнешь лучше, чем свежеоткрытая пачка печенья Oreo",
      "🌟 Твоя энергия сегодня как первый глоток кофе — неожиданно бодрит окружающих",
      "✨ Твоя улыбка стоит дороже, чем биткоин на пике. И гораздо стабильнее",
      "🍪 Вселенная шепчет: сегодня можно съесть печеньку ДО обеда",
      "🌈 Можно есть круассан руками. Всегда можно",
      "🎨 Сегодня официально разрешено ничего не делать. Вселенная подписала документы",
      "💛 Твоя улыбка + пятница + пицца = идеальная формула счастья",
      "🎪 Кот + тёплый плед + дождь за окном = абсолютное совершенство",
      "🌟 Ты + кофе + хорошая песня = непобедимая комбинация",
      "🦖 Если бы ты был динозавром, то самым милым тираннозавром",
      "🧀 Ты круче, чем сыр с плесенью. И я говорю это как комплимент",
      "🚀 Если бы ты был планетой, ты бы точно был той, на которой есть Wi-Fi",
      "🧦 Ты как носок, / который нашёлся после стирки / — неожиданная радость!",
      "🍕 Пицца остыла, / но ты всё равно её съел / — вот это характер",
      "☔ Дождь идёт уже час, / а ты не взял зонт / — живёшь на грани, красавчик",
      "🐱 Кто-то сейчас думает о тебе. Возможно, это твой кот, но всё равно считается",
      "🦆 Где-то в мире утка подумала о тебе. Наверное",
      "🌍 В параллельной вселенной ты уже герой. Здесь тоже неплохо справляешься"
    ];

    // Шаблоны с именем друга
    const friendTemplates = [
      "🦖 [имя] и ты — как два динозавра, которые нашли друг друга в мезозойском хаосе",
      "🍕 Вы с [имя] словно ананас на пицце: кто-то не понимает, но вам идеально вместе",
      "🚀 Ты и [имя] — это как Wi-Fi и пароль: по отдельности скучно, а вместе мощь",
      "🧸 [имя] — тот самый носок, который всегда находится, когда ты рядом",
      "✨ Твоя дружба с [имя] светит ярче, чем экран телефона в 3 часа ночи",
      "🦆 Вы с [имя] — две утки в одном пруду абсурда, и это прекрасно"
    ];

    // ---------- STATE ----------
    let currentMessageText = '';
    let doseCount = parseInt(localStorage.getItem('dopamineDose') || '0');
    let reactionCounts = JSON.parse(localStorage.getItem('reactionCounts') || '{}');

    // ---------- DOM ----------
    const chatMessages = document.getElementById('chatMessages');
    const leverHandle = document.getElementById('leverHandle');
    const glitchOverlay = document.getElementById('glitchOverlay');
    const imageCanvas = document.getElementById('imageCanvas');
    const ctx = imageCanvas.getContext('2d');
    const friendInputArea = document.getElementById('friendInputArea');
    const friendNameInput = document.getElementById('friendNameInput');
    const friendSubmitBtn = document.getElementById('friendSubmitBtn');

    // ---------- FUNCTIONS ----------
    function playSound(type = 'message') {
      try {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        if (type === 'message') {
          osc.type = 'sine';
          osc.frequency.setValueAtTime(800, audioCtx.currentTime);
          osc.frequency.exponentialRampToValueAtTime(400, audioCtx.currentTime + 0.1);
          gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
          osc.start(audioCtx.currentTime);
          osc.stop(audioCtx.currentTime + 0.15);
        } else if (type === 'camera') {
          osc.type = 'triangle';
          osc.frequency.setValueAtTime(1200, audioCtx.currentTime);
          osc.frequency.exponentialRampToValueAtTime(600, audioCtx.currentTime + 0.2);
          gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);
          osc.start(audioCtx.currentTime);
          osc.stop(audioCtx.currentTime + 0.2);
        }
      } catch(e) {}
    }

    function vibrate() {
      if (window.navigator && window.navigator.vibrate) {
        window.navigator.vibrate(25);
      }
    }

    function triggerGlitch() {
      glitchOverlay.style.opacity = '1';
      setTimeout(() => { glitchOverlay.style.opacity = '0'; }, 80);
    }

    function addMessageToChat(text, sender = 'bot') {
      const row = document.createElement('div');
      row.className = `message-row ${sender}`;
      
      if (sender === 'bot') {
        row.innerHTML = `<div class="avatar">🧃</div><div class="bubble">${text}</div>`;
      } else {
        row.innerHTML = `<div class="bubble">${text}</div><div class="avatar">😎</div>`;
      }
      
      chatMessages.appendChild(row);
      chatMessages.scrollTop = chatMessages.scrollHeight;
      return row;
    }

    function addReactionsPanel() {
      const reactionsDiv = document.createElement('div');
      reactionsDiv.className = 'reactions';
      const reactions = ['💀', '😭', '💅', '🤝'];
      reactions.forEach(emoji => {
        const btn = document.createElement('button');
        btn.className = 'reaction-btn';
        btn.innerHTML = `${emoji} <span class="count">${reactionCounts[emoji] || 0}</span>`;
        btn.addEventListener('click', () => {
          reactionCounts[emoji] = (reactionCounts[emoji] || 0) + 1;
          btn.querySelector('.count').textContent = reactionCounts[emoji];
          btn.classList.add('active');
          setTimeout(() => btn.classList.remove('active'), 200);
          localStorage.setItem('reactionCounts', JSON.stringify(reactionCounts));
        });
        reactionsDiv.appendChild(btn);
      });
      chatMessages.appendChild(reactionsDiv);
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function addSharePanel() {
      const shareDiv = document.createElement('div');
      shareDiv.className = 'share-panel';
      
      const copyBtn = document.createElement('button');
      copyBtn.className = 'share-option';
      copyBtn.innerHTML = '📋 Текст';
      copyBtn.addEventListener('click', () => {
        navigator.clipboard.writeText(currentMessageText).then(() => {
          alert('Текст скопирован!');
        });
      });
      
      const imageBtn = document.createElement('button');
      imageBtn.className = 'share-option';
      imageBtn.innerHTML = '🖼️ Картинка';
      imageBtn.addEventListener('click', generateShareImage);
      
      const linkBtn = document.createElement('button');
      linkBtn.className = 'share-option';
      linkBtn.innerHTML = '🔗 Ссылка';
      linkBtn.addEventListener('click', () => {
        const url = new URL(window.location);
        url.searchParams.set('msg', encodeURIComponent(currentMessageText));
        navigator.clipboard.writeText(url.toString()).then(() => {
          alert('Ссылка скопирована!');
        });
      });
      
      shareDiv.appendChild(copyBtn);
      shareDiv.appendChild(imageBtn);
      shareDiv.appendChild(linkBtn);
      chatMessages.appendChild(shareDiv);
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function generateShareImage() {
      const canvas = imageCanvas;
      const ctx = canvas.getContext('2d');
      
      // Случайный градиент фона
      const gradients = [
        ['#ff00ff', '#00ffff'],
        ['#39FF14', '#FF69B4'],
        ['#FF69B4', '#FFD700'],
        ['#00F0FF', '#FF00FF']
      ];
      const [c1, c2] = gradients[Math.floor(Math.random() * gradients.length)];
      const gradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
      gradient.addColorStop(0, c1);
      gradient.addColorStop(1, c2);
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      
      // Глитч-линии
      ctx.fillStyle = 'rgba(255,255,255,0.1)';
      for (let i = 0; i < 20; i++) {
        ctx.fillRect(0, Math.random() * canvas.height, canvas.width, 2 + Math.random() * 3);
      }
      
      // Текст послания
      ctx.font = 'bold 60px "Inter", sans-serif';
      ctx.fillStyle = '#fff';
      ctx.textAlign = 'center';
      ctx.shadowColor = 'rgba(0,0,0,0.5)';
      ctx.shadowBlur = 15;
      
      // Перенос строк (простой)
      const words = currentMessageText.split(' ');
      let line = '';
      let y = canvas.height / 2 - 100;
      const maxWidth = canvas.width - 100;
      for (let word of words) {
        const testLine = line + word + ' ';
        if (ctx.measureText(testLine).width > maxWidth) {
          ctx.fillText(line, canvas.width/2, y);
          y += 80;
          line = word + ' ';
        } else {
          line = testLine;
        }
      }
      ctx.fillText(line, canvas.width/2, y);
      
      // Водяной знак
      ctx.font = '30px "Inter", sans-serif';
      ctx.fillStyle = 'rgba(255,255,255,0.6)';
      ctx.fillText('Послание случайно | #дофамин_автомат', canvas.width/2, canvas.height - 80);
      
      // Открываем картинку в новом окне
      const dataUrl = canvas.toDataURL('image/png');
      const win = window.open('', '_blank');
      win.document.write(`<img src="${dataUrl}" style="max-width:100%;"><br><p>Сохрани и делись в сторис!</p>`);
      playSound('camera');
    }

    function showFriendInput() {
      friendInputArea.style.display = 'flex';
      friendNameInput.focus();
    }

    friendSubmitBtn.addEventListener('click', () => {
      const name = friendNameInput.value.trim();
      if (!name) return;
      const template = friendTemplates[Math.floor(Math.random() * friendTemplates.length)];
      const message = template.replace('[имя]', name);
      currentMessageText = message;
      
      // Очищаем предыдущие сообщения (оставляем только приветствие)
      chatMessages.innerHTML = '';
      addMessageToChat('✨ Привет! Я дофамин-автомат. Дёрни рычаг или отправь послание другу.', 'bot');
      addMessageToChat(message, 'bot');
      addReactionsPanel();
      addSharePanel();
      
      friendInputArea.style.display = 'none';
      friendNameInput.value = '';
      doseCount++;
      localStorage.setItem('dopamineDose', doseCount);
      playSound('message');
      triggerGlitch();
    });

    // Основная генерация
    function generateNewMessage() {
      const randomMsg = messages[Math.floor(Math.random() * messages.length)];
      currentMessageText = randomMsg;
      
      // Очищаем чат (кроме заголовка)
      chatMessages.innerHTML = '';
      addMessageToChat('🧃 Твоё послание...', 'bot');
      addMessageToChat(randomMsg, 'bot');
      addReactionsPanel();
      addSharePanel();
      
      doseCount++;
      localStorage.setItem('dopamineDose', doseCount);
      playSound('message');
      triggerGlitch();
      vibrate();
    }

    // Рычаг
    leverHandle.addEventListener('click', (e) => {
      e.preventDefault();
      generateNewMessage();
    });

    // Кнопка "для друга" (добавим её как маленькую иконку рядом с рычагом)
    const friendToggleBtn = document.createElement('div');
    friendToggleBtn.innerHTML = '👥';
    friendToggleBtn.style.cssText = 'position:fixed; bottom:30px; left:30px; font-size:2rem; background:rgba(255,255,255,0.1); border-radius:50%; width:50px; height:50px; display:flex; align-items:center; justify-content:center; cursor:pointer; z-index:100;';
    friendToggleBtn.addEventListener('click', showFriendInput);
    document.body.appendChild(friendToggleBtn);

    // Темы
    function setTheme(theme) {
      document.body.className = `theme-${theme}`;
      localStorage.setItem('selectedTheme', theme);
    }
    const savedTheme = localStorage.getItem('selectedTheme') || 'pink';
    setTheme(savedTheme);

    // Фоновые эмодзи
    const emojiRain = document.getElementById('emojiRain');
    const emojis = ['💖','✨','🧃','🍀','🎲','💫','🌸','🦖','🕹️','💊'];
    function spawnEmoji() {
      const span = document.createElement('span');
      span.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      span.style.cssText = `position:absolute; left:${Math.random()*100}%; top:${Math.random()*100}%; font-size:${1+Math.random()*2}rem; animation: floatEmoji ${4+Math.random()*6}s infinite ease-in-out;`;
      emojiRain.appendChild(span);
      setTimeout(() => span.remove(), 10000);
    }
    const floatStyle = document.createElement('style');
    floatStyle.textContent = '@keyframes floatEmoji{0%{transform:translateY(0) rotate(0);opacity:1}50%{transform:translateY(-30px) rotate(180deg);opacity:0.8}100%{transform:translateY(0) rotate(360deg);opacity:1}}';
    document.head.appendChild(floatStyle);
    setInterval(spawnEmoji, 500);
    for(let i=0;i<10;i++) spawnEmoji();

    // Приветственное сообщение
    addMessageToChat('✨ Привет! Я дофамин-автомат. Дёрни рычаг или отправь послание другу.', 'bot');

    // Если URL содержит параметр msg, показываем его
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.has('msg')) {
      currentMessageText = decodeURIComponent(urlParams.get('msg'));
      addMessageToChat(currentMessageText, 'bot');
      addReactionsPanel();
      addSharePanel();
    }
  </script>
</body>
</html>
