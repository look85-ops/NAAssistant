<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Послание случайно — дофамин по запросу</title>
  <meta name="description" content="Бот-сайт, который дарит абсурдные, милые и вдохновляющие послания. Дофамин по запросу — бессмысленная нежность для всех." />
  <meta name="theme-color" content="#a05cff" />
  <link rel="manifest" href="manifest.webmanifest" />
  <!-- iOS PWA meta -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Послание случайно" />
  <meta name="format-detection" content="telephone=no" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon-180.png" sizes="180x180" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" sizes="192x192" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap');
    :root {
      --bg-1: #f9f7ff;
      --bg-2: #fff6f3;
      --ink: #1b1b1f;
      --muted: #6b7280;
      --accent: #7c3aed; /* violet */
      --accent-2: #06b6d4; /* cyan */
      --card: rgba(255,255,255,0.65);
      --shadow: 0 20px 50px rgba(31, 41, 55, 0.15);
      --radius: 18px;
    }

    html, body { height: 100%; }
    body {
      margin: 0;
      color: var(--ink);
      background: linear-gradient(135deg, #ffd6e0, #e8d5ff, #c6f9ff);
      font: 16px/1.5 'Nunito', ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
      display: grid;
      place-items: center;
      overflow-x: hidden;
    }

    .wrap {
      width: min(920px, 92vw);
      margin: 40px auto;
    }

    .card {
      background: var(--card);
      border: 1px solid rgba(124,58,237,0.08);
      backdrop-filter: blur(10px);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 28px 22px;
    }

    header { text-align: center; margin-bottom: 18px; position: relative; z-index: 2; }
    .title {
      font-weight: 900;
      letter-spacing: 0.2px;
      font-size: clamp(28px, 5vw, 48px);
      margin: 0 0 6px 0;
      color: #5a2a82;
      text-shadow: 0 0 8px rgba(160,92,255,0.6), 0 0 18px rgba(160,92,255,0.35);
      animation: flicker 3s infinite ease-in-out;
    }
    .tagline { color: var(--muted); font-size: 14px; margin: 0; }

    .panel {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
      align-items: center;
    }

    .cta {
      display: grid; place-items: center; text-align: center;
      padding: 14px;
    }

    /* Убрали устаревшую кнопку-сердце и подсказки */

    .msg {
      margin: 6px auto 2px;
      background: #fff;
      border: 1px solid rgba(2,6,23,0.06);
      border-radius: 16px;
      padding: 18px 16px;
      box-shadow: 0 6px 18px rgba(2,6,23,0.06);
    }

    .label { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: .12em; }
    .text { font-size: clamp(18px, 2.6vw, 24px); margin-top: 6px; }
    .meta { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; color: var(--muted); font-size: 12px; }

    .actions {
      display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-top: 10px;
    }
    .btn {
      cursor: pointer; border: 1px solid rgba(2,6,23,0.12); background: #fff; color: var(--ink);
      padding: 10px 12px; border-radius: 12px; font-size: 14px;
      transition: transform .06s ease, background .15s ease;
    }
    .btn:hover { background: #f8f9fb; transform: translateY(-1px); }
    .btn:active { transform: translateY(1px) scale(.99); }

    .promo { margin-top: 10px; color: #6d28d9; font-size: 14px; text-align: center; display:none; }

    footer { text-align: center; margin-top: 14px; color: var(--muted); font-size: 12px; }

    @media (prefers-reduced-motion: no-preference) {
      .pop {
        animation: pop .25s ease-out;
      }
      @keyframes pop { from { transform: scale(.98); opacity: .7 } to { transform: scale(1); opacity: 1 } }
      @keyframes flicker { 0%,100%{ opacity:1 } 45%{ opacity:.96 } 46%{ opacity:.7 } 47%{ opacity:1 } 70%{ opacity:.95 } }
      @keyframes fall { from { transform: translateY(-10vh) rotate(0deg); opacity: 0 } to { transform: translateY(110vh) rotate(360deg); opacity: .9 } }
    }

    /* Падающие эмодзи позади карточки */
    .bg-emoji {
      position: fixed; inset: 0; overflow: hidden; pointer-events: none; z-index: 0;
    }
    .bg-emoji .drop { position: absolute; top: -10vh; font-size: clamp(18px, 3.8vw, 32px); filter: drop-shadow(0 2px 2px rgba(0,0,0,.1)); opacity: .85; animation: fall linear infinite; }

    /* Переключатель тем */
    .theme-selector {
      position: fixed; top: 14px; right: 14px; z-index: 10; display: flex; gap: 8px;
      background: rgba(0,0,0,0.08); border: 1px solid rgba(0,0,0,0.06); padding: 6px; border-radius: 999px;
      backdrop-filter: blur(8px);
    }
    .theme-dot { width: 22px; height: 22px; border-radius: 50%; cursor: pointer; border: 2px solid rgba(255,255,255,0.7); box-shadow: 0 1px 6px rgba(0,0,0,0.12); }
    .t-pink { background: linear-gradient(135deg, #ff69b4, #39ff14); }
    .t-green { background: linear-gradient(135deg, #39ff14, #00ffff); }
    .t-vapor { background: linear-gradient(135deg, #ff00ff, #00ffff); }

    /* Темы поверх базовых токенов */
    body.theme-pink { --accent: #ff69b4; --accent-2: #39ff14; }
    body.theme-green { --accent: #39ff14; --accent-2: #06b6d4; }
    body.theme-vapor { --accent: #ff00ff; --accent-2: #00ffff; }

    /* Рычаг-CTA */
    .lever-area { text-align: center; margin-top: 4px; }
    .lever { font-size: 42px; filter: drop-shadow(0 0 10px rgba(160,92,255,0.4)); cursor: pointer; display: inline-block; user-select: none; animation: float 2s ease-in-out infinite; }
    .lever:active { transform: translateY(6px) scale(0.96); animation: none; }
    @keyframes float { 0%,100% { transform: translateY(0) } 50% { transform: translateY(-6px) } }

    /* Реакции */
    .reactions { display: flex; gap: 10px; justify-content: center; margin-top: 8px; flex-wrap: wrap; }
    .react-btn { background: rgba(255,255,255,0.85); border: 1px solid rgba(2,6,23,0.1); border-radius: 999px; padding: 6px 10px; font-size: 16px; cursor: pointer; }
    .react-btn .count { color: var(--muted); font-size: 12px; margin-left: 6px; }
    .react-btn:active { transform: translateY(1px); }

    /* Canvas скрыт */
    canvas#shareCanvas { display: none; }
  </style>
</head>
<body>
  <div class="bg-emoji" id="bg"></div>
  <div class="theme-selector" aria-label="Темы оформления">
    <div class="theme-dot t-pink" title="Pink" data-theme="pink"></div>
    <div class="theme-dot t-green" title="Green" data-theme="green"></div>
    <div class="theme-dot t-vapor" title="Vaporwave" data-theme="vapor"></div>
  </div>
  <div class="wrap">
    <div class="card">
      <header>
        <h1 class="title">✨ Послание случайно</h1>
        <p class="tagline">Дофамин по запросу — бессмысленная нежность для всех</p>
      </header>

      <div class="panel">
        <div class="lever-area"><div id="lever" class="lever" title="Дёрни рычаг">🕹️</div></div>

        <div class="msg" id="msg" hidden>
          <div class="label">✨ Послание для тебя</div>
          <div class="text" id="text"></div>
          <div class="meta">
            <span id="count">#0</span>
          </div>
        </div>

        <div class="reactions" id="reactions" hidden></div>

        <div class="actions">
          <button class="btn" id="copy">Скопировать</button>
          <button class="btn" id="share">Поделиться</button>
          <button class="btn" id="imgshare">Картинка (PNG)</button>
        </div>

        <div class="promo" id="promo"></div>
      </div>

      <footer>
        Без токсичного позитива. Только лёгкий абсурд и тепло. {v0.1}
      </footer>
    </div>
  </div>

  <canvas id="shareCanvas" width="1080" height="1920"></canvas>

  <script>
    // Конфиг API (опционально). Укажи адрес CF‑воркера с прокси к OpenRouter.
    // Пример: 'https://your-worker.workers.dev' или свой домен. Пусто = офлайн-режим.
    let API_BASE = '';
    let MODEL = 'anthropic/claude-3.7-sonnet'; // рекомендовано для креатива на русском

    // Категории и заранее отобранные послания, соответствуют правилам:
    // 1–2 эмодзи максимум; один в начале обязателен; без триггеров и клише
    const DATA = [
      {
        key: 'absurd_support',
        title: 'Абсурдная поддержка',
        items: [
          '✨ Сегодня ты справишься даже с распутыванием наушников с первого раза',
          '🎯 Ты мощнее, чем Wi‑Fi сигнал у окна',
          '⚡ Твоя продуктивность сегодня на уровне батарейки Duracell — может, немного б/у, но всё ещё работает!'
        ]
      },
      {
        key: 'cosmic',
        title: 'Космическая перспектива',
        items: [
          '🌌 Ты существуешь. И это уже невероятное достижение на фоне бесконечности космоса',
          '💫 Твоё существование статистически невероятно. А ты вот просто существуешь. Магия',
          '⭐ Ты — временная конфигурация атомов, которая умеет переживать и любить. Это круто'
        ]
      },
      {
        key: 'weird_compliments',
        title: 'Странные комплименты',
        items: [
          '💐 Ты пахнешь лучше, чем свежеоткрытая пачка печенья Oreo',
          '🌟 Твоя энергия сегодня как первый глоток кофе — неожиданно бодрит окружающих',
          '✨ Твоя улыбка стоит дороже, чем биткоин на пике. И гораздо стабильнее'
        ]
      },
      {
        key: 'silly_compares',
        title: 'Нелепые сравнения',
        items: [
          '🦖 Если бы ты был динозавром, то самым милым тираннозавром',
          '🧀 Ты круче, чем сыр с плесенью. И я говорю это как комплимент',
          '🚀 Если бы ты был планетой, ты бы точно был той, на которой есть Wi‑Fi'
        ]
      },
      {
        key: 'haiku_fars',
        title: 'Хайку‑фарс',
        items: [
          '🧦 Ты как носок, / который нашёлся после стирки / — неожиданная радость!',
          '🍕 Пицца остыла, / но ты всё равно её съел / — вот это характер',
          '☔ Дождь идёт уже час, / а ты не взял зонт / — живёшь на грани, красавчик'
        ]
      }
    ];

    // Безопасные примеры для стартового пула
    const SAFE = [
      '✨ Ты справляешься лучше, чем GPS в незнакомом городе. А это, знаешь ли, непростая задача.',
      '🧦 Ты как носок, который нашёлся после стирки — неожиданная радость',
      '🔔 Сегодня у тебя столько же возможностей, сколько непрочитанных уведомлений. И это много'
    ];

    const elMsg = document.getElementById('msg');
    const elText = document.getElementById('text');
    const elCount = document.getElementById('count');
    const elPromo = document.getElementById('promo');
    const btnCopy = document.getElementById('copy');
    const btnShare = document.getElementById('share');
    const btnImg = document.getElementById('imgshare');
    const elReactions = document.getElementById('reactions');
    const elLever = document.getElementById('lever');
    const themeDots = Array.from(document.querySelectorAll('.theme-dot'));
    const canvas = document.getElementById('shareCanvas');

    let counter = 0;
    let lastCat = null;
    const used = new Set();
    let reactionCounts = {};

    function pickCategory() {
      // Не повторять последнюю категорию подряд
      const pool = DATA.filter(c => c.key !== lastCat);
      return pool[Math.floor(Math.random() * pool.length)];
    }

    function pickMessage(cat) {
      // Пытаемся избежать мгновенных повторов сообщений
      const choices = [...cat.items];
      for (let i = 0; i < choices.length * 2; i++) {
        const m = choices[Math.floor(Math.random() * choices.length)];
        const sig = cat.key + '|' + m;
        if (!used.has(sig) || used.size > 50) {
          used.add(sig);
          return m;
        }
      }
      return choices[Math.floor(Math.random() * choices.length)];
    }

    function setPromo(text) {
      if (!text) { elPromo.style.display = 'none'; elPromo.textContent = ''; return; }
      elPromo.textContent = text;
      elPromo.style.display = 'block';
    }

    function formatMeta() {
      elCount.textContent = '#' + counter;
    }

    function safeGenerate() {
      // Первое послание — из безопасного пула
      const m = SAFE[Math.floor(Math.random() * SAFE.length)];
      elText.textContent = m;
      lastCat = 'safe';
      counter++;
      formatMeta();
      elMsg.hidden = false;
      elMsg.classList.remove('pop');
      void elMsg.offsetWidth; // restart animation
      elMsg.classList.add('pop');
      setPromo('');
      renderReactions();
    }

    async function generateLocal() {
      const cat = pickCategory();
      const message = pickMessage(cat);
      lastCat = cat.key;
      counter++;
      elText.textContent = message;
      formatMeta();
      elMsg.hidden = false;
      elMsg.classList.remove('pop');
      void elMsg.offsetWidth; // restart animation
      elMsg.classList.add('pop');

      if (counter === 3) setPromo('💌 Поделись радостью! Скопируй и отправь другу.');
      else if (counter === 5) setPromo('✨ Уже 5 посланий! Поделись дофамином: скопируй и отправь другу.');
      else setPromo('');
      renderReactions();
    }

    function buildPrompt(prevKey) {
      const categories = [
        { key: 'absurd_support', title: 'Абсурдная поддержка' },
        { key: 'cosmic', title: 'Космическая перспектива' },
        { key: 'weird_compliments', title: 'Странные комплименты' },
        { key: 'silly_compares', title: 'Нелепые сравнения' },
        { key: 'haiku_fars', title: 'Хайку-фарс' }
      ];
      const banned = [
        'религия', 'политика', 'токсичный позитив', 'обесценивание чувств',
        'цитаты великих', 'усталость/выгорание', 'финансы/долги', 'одиночество',
        'внешность/вес', 'ментальное здоровье', 'сарказм про неудачи', 'работа/карьера негатив'
      ];
      const sys = `Ты генерируешь одно короткое послание в стиле «бессмысленная нежность»: дружелюбно,\nс лёгким абсурдом, без банальностей и токсичного позитива. Русский язык. Длина 50–200 символов.\nЭмодзи: ровно один в начале, опционально один в конце, максимум 2 всего. Избегай клише.\nЗапрещённые темы: ${banned.join(', ')}.`;
      const user = `Выбери случайную категорию из списка (ключ и краткое имя):\n${categories.map(c=>`- ${c.key}: ${c.title}`).join('\n')}\nНе используй категорию "${prevKey||''}" подряд.\nСгенерируй одно послание и верни ЧИСТЫЙ JSON без форматирования и без обратных кавычек: {"text":"...","category_key":"..."}.`;
      return { sys, user };
    }

    async function generateRemote() {
      const { sys, user } = buildPrompt(lastCat);
      try {
        const res = await fetch(API_BASE.replace(/\/$/, '') + '/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ model: MODEL, messages: [
            { role: 'system', content: sys },
            { role: 'user', content: user }
          ]})
        });
        if (!res.ok) throw new Error('upstream ' + res.status);
        const data = await res.json();
        const out = (data && (data.output || data.text || data.choices?.[0]?.message?.content)) || '';
        let text = '';
        let cat = '';
        try {
          const j = JSON.parse(out);
          text = String(j.text || '').trim();
          cat = String(j.category_key || '').trim();
        } catch (_) {
          text = String(out).trim();
        }
        if (!text) throw new Error('empty');
        // Показ
        lastCat = cat || lastCat || 'ai';
        counter++;
        elText.textContent = text;
        formatMeta();
        elMsg.hidden = false;
        elMsg.classList.remove('pop');
        void elMsg.offsetWidth; elMsg.classList.add('pop');
        if (counter === 3) setPromo('💌 Поделись радостью! Скопируй и отправь другу.');
        else if (counter === 5) setPromo('✨ Уже 5 посланий! Поделись дофамином: скопируй и отправь другу.');
        else setPromo('');
        renderReactions();
      } catch (e) {
        // Фоллбек на локальный генератор
        await generateLocal();
      }
    }

    async function generate() {
      if (API_BASE) return generateRemote();
      return generateLocal();
    }

    async function copyMessage() {
      const payload = elText.textContent.trim();
      if (!payload) return;
      try {
        await navigator.clipboard.writeText(payload);
        flash(btnCopy);
      } catch (e) {
        alert('Скопируй вручную:\n' + payload);
      }
    }

    async function shareMessage() {
      const payload = elText.textContent.trim();
      if (!payload) return;
      const title = 'Послание случайно';
      const canUrl = location.protocol.startsWith('http') ? location.href : '';
      if (navigator.share) {
        try {
          await navigator.share({ title, text: payload, url: canUrl || undefined });
          flash(btnShare);
          return;
        } catch (_) { /* user canceled */ }
      }
      // Фоллбек: копируем текст + промо
      const promo = '\n\nПрисоединяйся: @message_accidentalBot';
      try {
        await navigator.clipboard.writeText(payload + promo);
        alert('Скопировано! Отправь другу ✨');
      } catch (e) {
        alert('Скопируй вручную:\n' + payload + promo);
      }
    }

    function flash(el) {
      el.style.transform = 'translateY(-2px)';
      setTimeout(() => el.style.transform = '', 120);
    }

    // Реакции
    function loadReactions() {
      try { reactionCounts = JSON.parse(localStorage.getItem('ma_reactions')||'{}'); } catch(_) { reactionCounts = {}; }
    }
    function saveReactions() {
      try { localStorage.setItem('ma_reactions', JSON.stringify(reactionCounts)); } catch(_) {}
    }
    function incReact(key) {
      reactionCounts[key] = (reactionCounts[key]||0) + 1;
      saveReactions();
      renderReactions();
    }
    function renderReactions() {
      const payload = elText.textContent.trim();
      if (!payload) { elReactions.hidden = true; elReactions.innerHTML=''; return; }
      const EM = ['💖','😹','🤝','💅'];
      elReactions.innerHTML = '';
      EM.forEach(e => {
        const b = document.createElement('button');
        b.className = 'react-btn';
        const c = reactionCounts[e]||0;
        b.innerHTML = `${e} <span class="count">${c}</span>`;
        b.addEventListener('click', () => incReact(e));
        elReactions.appendChild(b);
      });
      elReactions.hidden = false;
    }

    // Шаринг картинкой
    function wrapText(ctx, text, maxWidth) {
      const words = text.split(' ');
      const lines = [];
      let line = '';
      for (const w of words) {
        const test = line + w + ' ';
        if (ctx.measureText(test).width > maxWidth && line) {
          lines.push(line.trim());
          line = w + ' ';
        } else {
          line = test;
        }
      }
      if (line) lines.push(line.trim());
      return lines;
    }
    function randomGradient(ctx, w, h) {
      const PAIRS = [['#ff00ff','#00ffff'],['#39FF14','#FF69B4'],['#ff85a2','#7c3aed'],['#00f0ff','#ff00ff']];
      const [c1,c2] = PAIRS[Math.floor(Math.random()*PAIRS.length)];
      const g = ctx.createLinearGradient(0,0,w,h);
      g.addColorStop(0,c1); g.addColorStop(1,c2); return g;
    }
    function glitchLines(ctx, w, h) {
      ctx.fillStyle = 'rgba(255,255,255,0.08)';
      for (let i=0;i<18;i++) ctx.fillRect(0, Math.random()*h, w, 1+Math.random()*2);
    }
    function watermark(ctx, w, h, siteUrl) {
      ctx.textAlign = 'center';
      ctx.fillStyle = 'rgba(255,255,255,0.92)';
      // Лозунг
      ctx.font = '28px Nunito, system-ui, sans-serif';
      ctx.fillText('Послание случайно. Бессмысленная нежность для всех', w/2, h-84);
        // URL сайта (если доступен)
        if (siteUrl) {
          ctx.font = '22px Nunito, system-ui, sans-serif';
          ctx.fillStyle = 'rgba(255,255,255,0.9)';
          ctx.fillText(siteUrl, w/2, h-48);
        }
    }
    function shareAsImage() {
      const text = elText.textContent.trim(); if (!text) return;
      const c = canvas; const ctx = c.getContext('2d'); const w=c.width, h=c.height;
      ctx.fillStyle = randomGradient(ctx, w, h); ctx.fillRect(0,0,w,h);
      glitchLines(ctx, w, h);
      ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.shadowColor='rgba(0,0,0,0.35)'; ctx.shadowBlur=14;
      // Message
      const base = 56; let size = base; ctx.font = `bold ${size}px Inter, Nunito, system-ui, sans-serif`;
      const lines = wrapText(ctx, text, w-140);
      let y = h/2 - (lines.length-1)*base*0.8;
      lines.forEach(ln => { ctx.fillText(ln, w/2, y); y += base*1.2; });
      const site = (location.protocol.startsWith('http') ? (location.href.split('?')[0]) : '');
      watermark(ctx, w, h, site);
      const url = c.toDataURL('image/png');
      const win = window.open('', '_blank');
      if (win && win.document) {
        const siteHref = (location.protocol.startsWith('http') ? (location.href.split('?')[0]) : '');
        const siteLabel = 'Послание случайно. Бессмысленная нежность для всех';
        win.document.write(`<a href="${siteHref || '#'}" target="_blank" rel="noopener"><img src="${url}" style="max-width:100%"></a><br><p>Сохрани и делись ✨</p>${siteHref ? `<p><a href="${siteHref}" target="_blank" rel="noopener">${siteLabel}</a></p>` : ''}`);
      } else {
        // Фоллбек на скачивание
        const a = document.createElement('a'); a.href=url; a.download='message.png'; a.click();
      }
    }

    // Events
    // Основной генератор теперь только через рычаг или клавиши
    btnCopy.addEventListener('click', copyMessage);
    btnShare.addEventListener('click', shareMessage);
    btnImg.addEventListener('click', shareAsImage);
    elLever.addEventListener('click', () => { if (counter === 0) safeGenerate(); else generate(); });
    window.addEventListener('keydown', (e) => {
      if (e.code === 'Space' || e.code === 'Enter') {
        e.preventDefault();
        if (counter === 0) safeGenerate(); else generate();
      }
    });

    // Показать приветствие мгновенно? Оставим по клику для эффекта «награды»

    // Падающие эмодзи: создаём N элементов с рандомом
    (function initFalling() {
      const bg = document.getElementById('bg');
      const EMOJI = ['✨','💖','🌈','⚡','🦄','🍓','🥐','🌟','🎈','🫧'];
      const N = 22;
      for (let i=0;i<N;i++) {
        const s = document.createElement('span');
        s.className = 'drop';
        s.textContent = EMOJI[Math.floor(Math.random()*EMOJI.length)];
        const left = Math.random()*100; // vw
        const delay = Math.random()*6; // s
        const dur = 6 + Math.random()*8; // s
        s.style.left = left + 'vw';
        s.style.animationDuration = dur + 's';
        s.style.animationDelay = delay + 's';
        bg.appendChild(s);
      }
    })();

    // Инициализация API из query/localStorage
    (function initApi() {
      try {
        const sp = new URLSearchParams(location.search);
        const qApi = sp.get('api');
        const qModel = sp.get('model');
        if (qApi) {
          API_BASE = qApi;
          localStorage.setItem('ma_api_base', API_BASE);
        } else {
          API_BASE = localStorage.getItem('ma_api_base') || '';
        }
        if (qModel) {
          MODEL = qModel;
          localStorage.setItem('ma_model', MODEL);
        } else {
          MODEL = localStorage.getItem('ma_model') || MODEL;
        }
      } catch (_) { /* ignore */ }
      if (!API_BASE) {
        // Авто-настройка Netlify Functions, если сайт на Netlify
        try {
          const isNetlify = !!(window.location && /netlify\.app$/.test(window.location.hostname));
          if (isNetlify) {
            API_BASE = '/.netlify/functions';
            localStorage.setItem('ma_api_base', API_BASE);
          }
        } catch(_) {}
      }
    })();

    // Темы
    (function initTheme(){
      const apply = (t) => { document.body.classList.remove('theme-pink','theme-green','theme-vapor'); document.body.classList.add('theme-'+t); localStorage.setItem('ma_theme', t); };
      const saved = localStorage.getItem('ma_theme') || 'pink'; apply(saved);
      themeDots.forEach(d => d.addEventListener('click', () => apply(d.getAttribute('data-theme'))));
    })();

    // Загрузить реакции
    loadReactions();

    // Регистрация сервис-воркера (PWA)
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(()=>{});
      });
    }
  </script>
</body>
</html>
