<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Послание случайно | дофамин-автомат 🧃</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #FF69B4;
      --text: #fff;
      --accent: #39FF14;
      --accent2: #00F0FF;
      --bubble-bot: #2D1B3D;
      --bubble-user: #3D2B5D;
      --font: 'Inter', sans-serif;
    }

    body {
      background: var(--bg);
      font-family: var(--font);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 100vh;
      color: var(--text);
      overflow-x: hidden;
      position: relative;
      transition: background 0.3s;
    }

    /* Убираем обводку: контейнер теперь прозрачный, на всю ширину */
    .container {
      position: relative;
      z-index: 2;
      width: 100%;
      padding: 20px;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow-y: auto;
    }

    .theme-selector {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 100;
      display: flex;
      gap: 10px;
      background: rgba(0,0,0,0.5);
      padding: 5px;
      border-radius: 30px;
    }

    .theme-btn {
      width: 25px;
      height: 25px;
      border-radius: 50%;
      border: 2px solid #fff;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .theme-btn:hover { transform: scale(1.2); }
    .theme-pink-btn { background: #FF69B4; }
    .theme-green-btn { background: #39FF14; }
    .theme-vaporwave-btn { background: linear-gradient(135deg, #ff00ff, #00ffff); }

    .chat-header {
      text-align: center;
      padding: 10px 0;
      border-bottom: 1px solid var(--accent);
      margin-bottom: 10px;
    }
    .chat-header h1 {
      font-size: 1.8rem;
      font-weight: 900;
      color: var(--accent2);
      text-shadow: 2px 2px 0 var(--accent);
      letter-spacing: -0.02em;
    }
    .chat-header .status {
      font-size: 0.8rem;
      color: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent2);
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; }
    }

    /* Рычаг теперь под заголовком */
    .lever-area {
      text-align: center;
      margin: 15px 0 20px;
    }
    .lever-handle {
      font-size: 3.5rem;
      cursor: pointer;
      display: inline-block;
      transition: transform 0.3s cubic-bezier(0.68, -0.55, 0.27, 1.55);
      user-select: none;
      filter: drop-shadow(0 0 15px var(--accent));
      animation: float 2s ease-in-out infinite;
    }
    .lever-handle:active {
      transform: translateY(15px) scale(0.85);
      animation: none;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-8px); }
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 10px 0;
      display: flex;
      flex-direction: column;
      gap: 15px;
      scrollbar-width: thin;
    }

    .message-row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
    }
    .message-row.bot { justify-content: flex-start; }
    .message-row.user { justify-content: flex-end; }

    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--bubble-bot);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      flex-shrink: 0;
    }

    .bubble {
      max-width: 75%;
      padding: 12px 16px;
      border-radius: 18px;
      font-size: 1.1rem;
      line-height: 1.4;
      word-break: break-word;
      animation: bubbleIn 0.3s ease-out;
    }
    .bot .bubble {
      background: var(--bubble-bot);
      border: 1px solid var(--accent);
      border-bottom-left-radius: 4px;
    }
    .user .bubble {
      background: var(--bubble-user);
      border: 1px solid var(--accent2);
      border-bottom-right-radius: 4px;
    }
    @keyframes bubbleIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .friend-input-area {
      display: none;
      gap: 10px;
      padding: 10px;
      background: rgba(0,0,0,0.5);
      border-radius: 30px;
      margin: 10px 0;
      align-items: center;
    }
    .friend-input {
      flex: 1;
      background: transparent;
      border: none;
      color: white;
      font-size: 1rem;
      padding: 8px 12px;
      outline: none;
    }
    .friend-input::placeholder { color: #aaa; }
    .friend-btn {
      background: var(--accent);
      border: none;
      color: #000;
      font-weight: bold;
      padding: 8px 18px;
      border-radius: 30px;
      cursor: pointer;
      font-size: 0.9rem;
    }

    .reactions {
      display: flex;
      gap: 12px;
      margin-top: 10px;
      flex-wrap: wrap;
    }
    .reaction-btn {
      background: rgba(255,255,255,0.1);
      border: none;
      color: white;
      font-size: 1.2rem;
      padding: 6px 12px;
      border-radius: 20px;
      cursor: pointer;
      transition: background 0.2s;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .reaction-btn.active { background: var(--accent); color: #000; }

    .share-panel {
      display: flex;
      gap: 10px;
      margin-top: 10px;
      flex-wrap: wrap;
    }
    .share-option {
      background: rgba(255,255,255,0.1);
      border: 1px solid var(--accent);
      color: white;
      padding: 8px 12px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 5px;
      transition: background 0.2s;
    }
    .share-option:hover { background: var(--accent); color: #000; }

    #imageCanvas { display: none; }

    .glitch-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(2px);
      z-index: 50;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.1s;
    }

    #glitchCanvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .friend-toggle-btn {
      position: fixed;
      bottom: 30px;
      left: 30px;
      font-size: 2rem;
      background: rgba(255,255,255,0.15);
      border-radius: 50%;
      width: 50px;
      height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 100;
      border: 1px solid var(--accent);
    }
  </style>
</head>
<body class="theme-pink">
  <canvas id="glitchCanvas"></canvas>
  <div class="glitch-overlay" id="glitchOverlay"></div>
  <canvas id="imageCanvas" width="1080" height="1920"></canvas>

  <div class="theme-selector">
    <div class="theme-btn theme-pink-btn" onclick="setTheme('pink')"></div>
    <div class="theme-btn theme-green-btn" onclick="setTheme('green')"></div>
    <div class="theme-btn theme-vaporwave-btn" onclick="setTheme('vaporwave')"></div>
  </div>

  <div class="container">
    <div class="chat-header">
      <h1>Послание случайно</h1>
      <div class="status"><span class="status-dot"></span> Дофамин по запросу. Бессмысленная радость для всех</div>
    </div>

    <!-- Рычаг сразу после заголовка -->
    <div class="lever-area">
      <div class="lever-handle" id="leverHandle">🕹️</div>
      <div style="color:var(--accent); font-size:0.8rem;">дёрни рычаг</div>
    </div>

    <div class="chat-messages" id="chatMessages"></div>

    <div class="friend-input-area" id="friendInputArea">
      <input type="text" class="friend-input" id="friendNameInput" placeholder="Имя друга...">
      <button class="friend-btn" id="friendSubmitBtn">Отправить</button>
    </div>
  </div>

  <div class="friend-toggle-btn" id="friendToggleBtn">👥</div>

  <script>
    // ---------- AI ПРОКСИ ----------
    const AI_API = 'https://thrgbbnh-nmbot.hf.space/chat';
    const AI_MODEL = 'deepseek/deepseek-chat';
    const AI_FALLBACK_MODEL = 'google/gemini-2.5-flash-lite';
    let aiBusy = false;

    function sanitizeAiText(raw) {
      let s = String(raw || '').trim();
      // Срезаем код-блоки/бэктики
      s = s.replace(/^```[\s\S]*?\n([\s\S]*?)\n```$/m, '$1').trim();
      s = s.replace(/^`+|`+$/g, '').trim();
      // Берём только первую непустую строку — без объяснений и мета-комментариев
      const firstLine = s.split(/\r?\n/).map(x => x.trim()).find(x => x.length > 0) || '';
      s = firstLine;
      // Срезаем хвостовые скобочные приписки: "(2 эмодзи соблюдены, 154 символа)" и т.п.
      s = s.replace(/\s*[\(\[][^()\[\]]{0,200}[\)\]]\s*$/u, '').trim();
      // Срезаем хвостовые "— Примечание: ...", "Комментарий: ..."
      s = s.replace(/\s*[—\-–]\s*(Примечание|Комментарий|Note)\s*[:：].*$/iu, '').trim();
      // Срезаем парные кавычки/«ёлочки»
      s = s.replace(/^[«"'“”„]+|[»"'“”„]+$/g, '').trim();
      return s;
    }

    async function aiGenerate({ friendName = null } = {}) {
      const banned = 'религия, политика, токсичный позитив, выгорание, финансы/долги, одиночество, внешность/вес, ментальное здоровье, сарказм про неудачи, работа/карьера негатив';
      const sys = [
        'Ты генератор коротких добрых посланий «бессмысленная нежность».',
        'СТРОГИЕ ПРАВИЛА ВЫВОДА:',
        '— Верни ТОЛЬКО сам текст послания, одной строкой.',
        '— Никаких пояснений, комментариев, мета-замечаний, подсчётов символов или эмодзи.',
        '— Никаких префиксов вроде «Послание:», «Ответ:», «Вот:».',
        '— Не оборачивай текст в кавычки, скобки или код-блок.',
        '— Длина 50–180 символов. Русский язык.',
        '— Один эмодзи в начале — обязателен. Максимум 2 эмодзи во всём тексте.',
        '— Тон: дружелюбный, лёгкий абсурд, без банальностей и токсичного позитива.',
        `— Запрещённые темы: ${banned}.`
      ].join('\n');
      const user = friendName
        ? `Сгенерируй послание про дружбу с человеком по имени «${friendName}». Имя используй естественно. Помни: только сам текст, без объяснений.`
        : `Сгенерируй неожиданное доброе абсурдное послание для случайного человека. Только сам текст, без объяснений.`;
      const ctrl = new AbortController();
      const tm = setTimeout(() => ctrl.abort(), 20000);
      try {
        const res = await fetch(AI_API, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            model: AI_MODEL,
            fallback_model: AI_FALLBACK_MODEL,
            temperature: 0.9,
            max_tokens: 120,
            messages: [
              { role: 'system', content: sys },
              { role: 'user', content: user }
            ]
          }),
          signal: ctrl.signal
        });
        clearTimeout(tm);
        if (!res.ok) throw new Error('upstream ' + res.status);
        const data = await res.json();
        const raw = (data && (data.output || data?.raw?.choices?.[0]?.message?.content)) || '';
        const text = sanitizeAiText(raw);
        if (!text) throw new Error('empty');
        return text;
      } finally {
        clearTimeout(tm);
      }
    }

    function pickLocalFallback(friendName) {
      if (friendName) {
        const t = friendTemplates[Math.floor(Math.random() * friendTemplates.length)];
        return t.replace('[имя]', friendName);
      }
      return messages[Math.floor(Math.random() * messages.length)];
    }

    async function pullLever(friendName = null) {
      if (aiBusy) return;
      aiBusy = true;
      chatMessages.innerHTML = '';
      addMessageToChat('🧃 Включаю автомат… секунду', 'bot');
      try {
        const text = await aiGenerate({ friendName });
        generateMessage(text);
      } catch (e) {
        generateMessage(pickLocalFallback(friendName));
      } finally {
        aiBusy = false;
      }
    }

    // ---------- ПАЛИТРЫ ТЕМ ----------
    const themes = {
      pink: { bg: '#FF69B4', accent: '#39FF14', accent2: '#00F0FF', bubbleBot: '#2D1B3D', bubbleUser: '#3D2B5D' },
      green: { bg: '#050505', accent: '#39FF14', accent2: '#FF69B4', bubbleBot: '#1a2a1a', bubbleUser: '#2a3a2a' },
      vaporwave: { bg: '#0d0221', accent: '#ff00ff', accent2: '#00ffff', bubbleBot: '#1a0a2e', bubbleUser: '#2a1a4e' }
    };
    let currentTheme = 'pink';

    function setTheme(theme) {
      currentTheme = theme;
      const t = themes[theme];
      document.documentElement.style.setProperty('--bg', t.bg);
      document.documentElement.style.setProperty('--accent', t.accent);
      document.documentElement.style.setProperty('--accent2', t.accent2);
      document.documentElement.style.setProperty('--bubble-bot', t.bubbleBot);
      document.documentElement.style.setProperty('--bubble-user', t.bubbleUser);
      document.body.style.background = t.bg;
      localStorage.setItem('selectedTheme', theme);
    }
    const savedTheme = localStorage.getItem('selectedTheme') || 'pink';
    setTheme(savedTheme);

    // ---------- ДАННЫЕ ----------
    const messages = [
      "✨ Сегодня ты справишься даже с распутыванием наушников с первого раза",
      "🎯 Ты мощнее, чем Wi-Fi сигнал у окна",
      "⚡ Твоя продуктивность сегодня на уровне батарейки Duracell — может, немного б/у, но всё ещё работает!",
      "🌌 Ты существуешь. И это уже невероятное достижение на фоне бесконечности космоса",
      "💫 Твоё существование статистически невероятно. А ты вот просто существуешь. Магия",
      "⭐ Ты — временная конфигурация атомов, которая умеет переживать и любить. Это круто",
      "💐 Ты пахнешь лучше, чем свежеоткрытая пачка печенья Oreo",
      "🌟 Твоя энергия сегодня как первый глоток кофе — неожиданно бодрит окружающих",
      "✨ Твоя улыбка стоит дороже, чем биткоин на пике. И гораздо стабильнее",
      "🍪 Вселенная шепчет: сегодня можно съесть печеньку ДО обеда",
      "🌈 Можно есть круассан руками. Всегда можно",
      "🎨 Сегодня официально разрешено ничего не делать. Вселенная подписала документы",
      "💛 Твоя улыбка + пятница + пицца = идеальная формула счастья",
      "🎪 Кот + тёплый плед + дождь за окном = абсолютное совершенство",
      "🌟 Ты + кофе + хорошая песня = непобедимая комбинация",
      "🦖 Если бы ты был динозавром, то самым милым тираннозавром",
      "🧀 Ты круче, чем сыр с плесенью. И я говорю это как комплимент",
      "🚀 Если бы ты был планетой, ты бы точно был той, на которой есть Wi-Fi",
      "🧦 Ты как носок, / который нашёлся после стирки / — неожиданная радость!",
      "🍕 Пицца остыла, / но ты всё равно её съел / — вот это характер",
      "☔ Дождь идёт уже час, / а ты не взял зонт / — живёшь на грани, красавчик",
      "🐱 Кто-то сейчас думает о тебе. Возможно, это твой кот, но всё равно считается",
      "🦆 Где-то в мире утка подумала о тебе. Наверное",
      "🌍 В параллельной вселенной ты уже герой. Здесь тоже неплохо справляешься"
    ];

    const friendTemplates = [
      "🦖 [имя] и ты — как два динозавра, которые нашли друг друга в мезозойском хаосе",
      "🍕 Вы с [имя] словно ананас на пицце: кто-то не понимает, но вам идеально вместе",
      "🚀 Ты и [имя] — это как Wi-Fi и пароль: по отдельности скучно, а вместе мощь",
      "🧸 [имя] — тот самый носок, который всегда находится, когда ты рядом",
      "✨ Твоя дружба с [имя] светит ярче, чем экран телефона в 3 часа ночи",
      "🦆 Вы с [имя] — две утки в одном пруду абсурда, и это прекрасно"
    ];

    // ---------- DOM ----------
    const chatMessages = document.getElementById('chatMessages');
    const leverHandle = document.getElementById('leverHandle');
    const glitchOverlay = document.getElementById('glitchOverlay');
    const imageCanvas = document.getElementById('imageCanvas');
    const ctx = imageCanvas.getContext('2d');
    const friendInputArea = document.getElementById('friendInputArea');
    const friendNameInput = document.getElementById('friendNameInput');
    const friendSubmitBtn = document.getElementById('friendSubmitBtn');
    const friendToggleBtn = document.getElementById('friendToggleBtn');

    let currentMessageText = '';
    let doseCount = parseInt(localStorage.getItem('dopamineDose') || '0');
    let reactionCounts = JSON.parse(localStorage.getItem('reactionCounts') || '{}');

    // ---------- ЗВУК ----------
    function playSound(type='message') {
      try {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        if (type==='message') {
          osc.type='sine'; osc.frequency.setValueAtTime(800,audioCtx.currentTime);
          osc.frequency.exponentialRampToValueAtTime(400,audioCtx.currentTime+0.1);
          gain.gain.setValueAtTime(0.2,audioCtx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.15);
          osc.start(audioCtx.currentTime); osc.stop(audioCtx.currentTime+0.15);
        } else if (type==='camera') {
          osc.type='triangle'; osc.frequency.setValueAtTime(1200,audioCtx.currentTime);
          osc.frequency.exponentialRampToValueAtTime(600,audioCtx.currentTime+0.2);
          gain.gain.setValueAtTime(0.15,audioCtx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.2);
          osc.start(audioCtx.currentTime); osc.stop(audioCtx.currentTime+0.2);
        }
      } catch(e) {}
    }

    function vibrate() {
      if (window.navigator && window.navigator.vibrate) window.navigator.vibrate(25);
    }

    function triggerGlitch() {
      glitchOverlay.style.opacity = '1';
      setTimeout(() => glitchOverlay.style.opacity = '0', 80);
    }

    // ---------- ОТРИСОВКА ГЛИТЧ-ФОНА (canvas) ----------
    const glitchCanvas = document.getElementById('glitchCanvas');
    const glitchCtx = glitchCanvas.getContext('2d');
    let particles = [];

    function resizeCanvas() {
      glitchCanvas.width = window.innerWidth;
      glitchCanvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    function initParticles(count = 80) {
      particles = [];
      for (let i=0; i<count; i++) {
        particles.push({
          x: Math.random() * glitchCanvas.width,
          y: Math.random() * glitchCanvas.height,
          w: 2 + Math.random() * 6,
          h: 2 + Math.random() * 6,
          speedX: (Math.random() - 0.5) * 1.5,
          speedY: (Math.random() - 0.5) * 1.5,
          color: Math.random() < 0.5 ? '#39FF14' : '#00F0FF',
          opacity: Math.random() * 0.8 + 0.2,
          life: Math.random() * 200 + 100,
          maxLife: 200 + Math.random() * 200
        });
      }
    }
    initParticles();

    function drawGlitchBackground() {
      glitchCtx.clearRect(0, 0, glitchCanvas.width, glitchCanvas.height);
      for (let p of particles) {
        glitchCtx.fillStyle = p.color;
        glitchCtx.globalAlpha = p.opacity;
        glitchCtx.fillRect(p.x, p.y, p.w, p.h);
        p.x += p.speedX;
        p.y += p.speedY;
        p.life--;
        if (p.life <= 0 || p.x<0 || p.x>glitchCanvas.width || p.y<0 || p.y>glitchCanvas.height) {
          p.x = Math.random() * glitchCanvas.width;
          p.y = Math.random() * glitchCanvas.height;
          p.life = p.maxLife;
        }
      }
      if (Math.random() < 0.1) {
        glitchCtx.fillStyle = '#FF69B4';
        glitchCtx.globalAlpha = 0.4;
        glitchCtx.fillRect(0, Math.random()*glitchCanvas.height, glitchCanvas.width, 2);
      }
      glitchCtx.globalAlpha = 1;
      requestAnimationFrame(drawGlitchBackground);
    }
    drawGlitchBackground();

    // ---------- ЧАТ ----------
    function addMessageToChat(text, sender='bot') {
      const row = document.createElement('div');
      row.className = `message-row ${sender}`;
      if (sender==='bot') {
        row.innerHTML = `<div class="avatar">🧃</div><div class="bubble">${text}</div>`;
      } else {
        row.innerHTML = `<div class="bubble">${text}</div><div class="avatar">😎</div>`;
      }
      chatMessages.appendChild(row);
      chatMessages.scrollTop = chatMessages.scrollHeight;
      return row;
    }

    function addReactionsPanel() {
      const reactionsDiv = document.createElement('div');
      reactionsDiv.className = 'reactions';
      ['💀','😭','💅','🤝'].forEach(emoji => {
        const btn = document.createElement('button');
        btn.className = 'reaction-btn';
        btn.innerHTML = `${emoji} <span class="count">${reactionCounts[emoji]||0}</span>`;
        btn.addEventListener('click', ()=>{
          reactionCounts[emoji] = (reactionCounts[emoji]||0) + 1;
          btn.querySelector('.count').textContent = reactionCounts[emoji];
          btn.classList.add('active');
          setTimeout(()=>btn.classList.remove('active'),200);
          localStorage.setItem('reactionCounts', JSON.stringify(reactionCounts));
        });
        reactionsDiv.appendChild(btn);
      });
      chatMessages.appendChild(reactionsDiv);
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function addSharePanel() {
      const shareDiv = document.createElement('div');
      shareDiv.className = 'share-panel';
      
      const copyBtn = document.createElement('button');
      copyBtn.className = 'share-option';
      copyBtn.innerHTML = '📋 Текст';
      copyBtn.addEventListener('click', ()=>{
        navigator.clipboard.writeText(currentMessageText).then(()=>alert('Текст скопирован!'));
      });
      
      const imageBtn = document.createElement('button');
      imageBtn.className = 'share-option';
      imageBtn.innerHTML = '🖼️ Картинка';
      imageBtn.addEventListener('click', generateShareImage);
      
      const linkBtn = document.createElement('button');
      linkBtn.className = 'share-option';
      linkBtn.innerHTML = '🔗 Ссылка';
      linkBtn.addEventListener('click', ()=>{
        const url = new URL(window.location);
        url.searchParams.set('msg', encodeURIComponent(currentMessageText));
        navigator.clipboard.writeText(url.toString()).then(()=>alert('Ссылка скопирована!'));
      });
      
      shareDiv.append(copyBtn, imageBtn, linkBtn);
      chatMessages.appendChild(shareDiv);
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function generateShareImage() {
      const canvas = imageCanvas;
      const ctx2d = canvas.getContext('2d');
      const gradients = [ ['#FF69B4','#00F0FF'], ['#39FF14','#FF69B4'], ['#FF00FF','#00FFFF'] ];
      const [c1,c2] = gradients[Math.floor(Math.random()*gradients.length)];
      const gradient = ctx2d.createLinearGradient(0,0,canvas.width,canvas.height);
      gradient.addColorStop(0,c1); gradient.addColorStop(1,c2);
      ctx2d.fillStyle = gradient;
      ctx2d.fillRect(0,0,canvas.width,canvas.height);
      ctx2d.fillStyle = 'rgba(0,0,0,0.2)';
      for(let i=0;i<25;i++) ctx2d.fillRect(0,Math.random()*canvas.height,canvas.width,2+Math.random()*4);
      ctx2d.font = 'bold 60px "Inter", sans-serif';
      ctx2d.fillStyle = '#fff';
      ctx2d.textAlign = 'center';
      ctx2d.shadowColor = 'rgba(0,0,0,0.7)';
      ctx2d.shadowBlur = 20;
      const words = currentMessageText.split(' ');
      let line = '', y = canvas.height/2 - 100;
      words.forEach(word => {
        const testLine = line + word + ' ';
        if (ctx2d.measureText(testLine).width > canvas.width-100) {
          ctx2d.fillText(line, canvas.width/2, y);
          y += 80; line = word + ' ';
        } else line = testLine;
      });
      ctx2d.fillText(line, canvas.width/2, y);
      ctx2d.font = '30px "Inter", sans-serif';
      ctx2d.fillStyle = 'rgba(255,255,255,0.6)';
      ctx2d.fillText('Послание случайно | #дофамин_автомат', canvas.width/2, canvas.height-80);
      
      const dataUrl = canvas.toDataURL('image/png');
      const win = window.open('','_blank');
      win.document.write(`<img src="${dataUrl}" style="max-width:100%;"><p>Сохраняй и делись!</p>`);
      playSound('camera');
    }

    // ---------- ГЕНЕРАЦИЯ ПОСЛАНИЯ ----------
    function generateMessage(text) {
      currentMessageText = text;
      chatMessages.innerHTML = '';
      addMessageToChat('🧃 Твоё послание...', 'bot');
      addMessageToChat(text, 'bot');
      addReactionsPanel();
      addSharePanel();
      doseCount++;
      localStorage.setItem('dopamineDose', doseCount);
      playSound('message');
      triggerGlitch();
      vibrate();
    }

    // рычаг
    leverHandle.addEventListener('click', (e)=>{
      e.preventDefault();
      pullLever();
    });

    // друг
    friendToggleBtn.addEventListener('click', ()=>{
      friendInputArea.style.display = 'flex';
      friendNameInput.focus();
    });

    friendSubmitBtn.addEventListener('click', ()=>{
      const name = friendNameInput.value.trim();
      if (!name) return;
      friendInputArea.style.display = 'none';
      friendNameInput.value = '';
      pullLever(name);
    });

    // URL параметр
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.has('msg')) {
      generateMessage(decodeURIComponent(urlParams.get('msg')));
    } else {
      addMessageToChat('✨ Привет! Дёрни рычаг и получи порцию дофамина', 'bot');
    }

    // встряхивание
    if (window.DeviceMotionEvent) {
      let lastShake = 0;
      window.addEventListener('devicemotion', (e)=>{
        const a = e.accelerationIncludingGravity;
        if (!a) return;
        const mag = Math.sqrt(a.x*a.x + a.y*a.y + a.z*a.z);
        if (mag>25 && Date.now()-lastShake>1000) {
          lastShake = Date.now();
          pullLever();
        }
      });
    }
  </script>
</body>
</html>
